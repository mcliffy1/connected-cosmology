<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Soliton Resonance & Geometric Framework Simulation</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #container {
            display: flex;
            flex-direction: row;
            width: 100vw;
            height: 100vh;
        }
        #sidebar {
            width: 380px;
            background: rgba(31, 40, 51, 0.9);
            backdrop-filter: blur(10px);
            border-right: 2px solid #45f3ff;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        h2 {
            margin-top: 0;
            color: #45f3ff;
            font-size: 1.3em;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #45f3ff;
            padding-bottom: 10px;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
        }
        h3 {
            margin: 8px 0 3px 0;
            color: #66fcf1;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .scale-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        label {
            font-size: 0.85em;
            color: #66fcf1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .value-display {
            float: right;
            color: #45f3ff;
            font-weight: bold;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #0b0c10;
            height: 10px;
            border-radius: 5px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #45f3ff;
            cursor: pointer;
            box-shadow: 0 0 8px #45f3ff;
        }
        .btn {
            background: transparent;
            border: 1px solid #45f3ff;
            color: #45f3ff;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn:hover {
            background: #45f3ff;
            color: #0b0c10;
        }
        .btn.active {
            background: #66fcf1;
            color: #0b0c10;
            border-color: #66fcf1;
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.4);
        }
        #sidebar-hud {
            border-top: 1px solid #66fcf1;
            margin-top: 5px;
            padding-top: 12px;
        }
        #framework-desc {
            border-top: 1px dashed rgba(69, 243, 255, 0.3);
            margin-top: 10px;
            padding-top: 10px;
            font-size: 0.85em;
            line-height: 1.5em;
            color: #c5c6c7;
        }
        .desc-block {
            margin-bottom: 10px;
        }
        .desc-title {
            color: #45f3ff;
            font-weight: bold;
        }
        #canvas-container {
            flex-grow: 1;
            position: relative;
            height: 100%;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #hud {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(11, 12, 16, 0.85);
            border: 1px solid #66fcf1;
            padding: 15px;
            border-radius: 6px;
            pointer-events: none;
            max-width: 420px;
            display: block;
        }
        .hud-title {
            color: #66fcf1;
            font-weight: bold;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-size: 0.95em;
        }
        .hud-text {
            font-size: 0.85em;
            line-height: 1.4em;
            color: #c5c6c7;
        }

        /* --- RESPONSIVE MEDIA BREAKPOINTS --- */
        @media (max-width: 768px) {
            #container { flex-direction: column; }
            #sidebar { width: 100vw; height: 50%; border-right: none; border-bottom: 2px solid #45f3ff; padding: 12px; gap: 10px; }
            h2 { font-size: 1.1em; padding-bottom: 6px; margin-bottom: 2px; }
            .btn { padding: 7px; font-size: 0.75em; }
            #hud { display: none !important; opacity: 0 !important; visibility: hidden !important; }
            #canvas-container { height: 50%; width: 100vw; }
        }
        @media (max-height: 500px) {
            #sidebar { width: 260px; padding: 10px; gap: 8px; }
            h2 { font-size: 1.0em; padding-bottom: 4px; }
            .btn { padding: 6px; font-size: 0.7em; }
            #hud { display: none !important; opacity: 0 !important; visibility: hidden !important; }
            #framework-desc { display: none; }
        }
        @media (min-width: 769px) and (min-height: 501px) {
            #sidebar-hud { display: none; }
        }
    </style>
</head>
