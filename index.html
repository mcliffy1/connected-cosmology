<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Superfluid Vacuum Theory & NLS Soliton Simulation</title>
    <style>
        body { margin: 0; background-color: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; user-select: none; }
        #container { display: flex; flex-direction: row; width: 100vw; height: 100vh; }
        #sidebar { width: 400px; background: rgba(31, 40, 51, 0.9); backdrop-filter: blur(10px); border-right: 2px solid #45f3ff; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; z-index: 10; box-shadow: 5px 0 15px rgba(0,0,0,0.5); overflow-y: auto; }
        h2 { margin-top: 0; color: #45f3ff; font-size: 1.3em; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #45f3ff; padding-bottom: 10px; text-shadow: 0 0 10px rgba(69, 243, 255, 0.3); }
        h3 { margin: 8px 0 3px 0; color: #66fcf1; font-size: 0.95em; text-transform: uppercase; letter-spacing: 1px; }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        .scale-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        label { font-size: 0.85em; color: #66fcf1; text-transform: uppercase; letter-spacing: 1px; }
        .value-display { float: right; color: #45f3ff; font-weight: bold; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: #0b0c10; height: 10px; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #45f3ff; cursor: pointer; box-shadow: 0 0 8px #45f3ff; }
        .btn { background: transparent; border: 1px solid #45f3ff; color: #45f3ff; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: #45f3ff; color: #0b0c10; }
        .btn.active { background: #66fcf1; color: #0b0c10; border-color: #66fcf1; box-shadow: 0 0 10px rgba(102, 252, 241, 0.4); }
        #sidebar-hud { border-top: 1px solid #66fcf1; margin-top: 5px; padding-top: 12px; }
        #framework-desc { border-top: 1px dashed rgba(69, 243, 255, 0.3); margin-top: 10px; padding-top: 10px; font-size: 0.85em; line-height: 1.5em; color: #c5c6c7; }
        .desc-block { margin-bottom: 10px; }
        .desc-title { color: #45f3ff; font-weight: bold; display: block; margin-bottom: 2px; }
        .equation { font-family: 'Courier New', Courier, monospace; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 4px; color: #66fcf1; text-align: center; margin: 8px 0; font-size: 1.1em; }
        #canvas-container { flex-grow: 1; position: relative; height: 100%; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #hud { position: absolute; bottom: 20px; right: 20px; background: rgba(11, 12, 16, 0.85); border: 1px solid #66fcf1; padding: 15px; border-radius: 6px; pointer-events: none; max-width: 420px; display: block; }
        .hud-title { color: #66fcf1; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; font-size: 0.95em; }
        .hud-text { font-size: 0.85em; line-height: 1.4em; color: #c5c6c7; }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <h2>SVT & NLS Dynamics</h2>
        <div class="control-group">
            <label>Scale Domain</label>
            <div class="scale-buttons">
                <button id="btn-macro" class="btn active">Galactic Soliton</button>
                <button id="btn-micro" class="btn">White's Atom</button>
                <button id="btn-bio" class="btn">Couder Pilot-Wave</button>
                <button id="btn-blackhole" class="btn">Vortex Core</button>
            </div>
        </div>

        <div class="control-group" id="param-lambda">
            <label>Non-Linear Self-Interaction (&lambda;) <span id="val-lambda" class="value-display">50</span></label>
            <input type="range" id="slider-lambda" min="10" max="150" step="1" value="50">
        </div>

        <div class="control-group">
            <label>Effective Fluid Mass (M_eff) <span id="val-mass" class="value-display">1.20</span></label>
            <input type="range" id="slider-mass" min="0.5" max="2.5" step="0.05" value="1.2">
        </div>

        <div class="control-group" id="param-dispersion">
            <label>Temporal Dispersion (D) <span id="val-dispersion" class="value-display">1</span></label>
            <input type="range" id="slider-dispersion" min="1" max="4" step="1" value="1">
        </div>

        <div class="control-group">
            <label>Global Phase State (&theta;) <span id="val-phase" class="value-display">0.00&pi;</span></label>
            <input type="range" id="slider-phase" min="0" max="2" step="0.01" value="0">
        </div>

        <div class="control-group">
            <label>Global Harmonic Coherence</label>
            <div id="rti-bar" style="height:6px; background:#0b0c10; border-radius:3px; position:relative; overflow:hidden; border:1px solid #45f3ff;">
                <div id="rti-fill" style="height:100%; width:80%; background:linear-gradient(90deg, #45f3ff, #66fcf1); transition:0.1s; box-shadow:0 0 8px #45f3ff;"></div>
            </div>
        </div>

        <button id="btn-pulse" class="btn">Trigger Phase-Locking Event</button>
        <button id="btn-lineweaver" class="btn" style="border-color:#ffff00; color:#ffff00; margin-top:5px;">Apply Lineweaver Coupling</button>

        <div id="sidebar-hud">
            <h3 id="mob-hud-title">Galactic Soliton Core</h3>
            <p id="mob-hud-text" style="font-size: 0.8em; line-height: 1.4em; color: #c5c6c7; margin: 4px 0 0 0;"></p>
        </div>

        <div id="framework-desc">
            <h3>Gross-Pitaevskii Mapping</h3>
            <div class="equation">
                &#8450; = i&#8463;&psi;*&#8706;&#8348;&psi; - (&#8463;&sup2;/2M)&nabla;&psi;&nabla;&psi;* - V|&psi;|&sup2; + (&lambda;/2)|&psi;|&sup4;
            </div>
        </div>
    </div>
    <div id="canvas-container">
        <canvas id="universeCanvas"></canvas>
        <div id="hud">
            <div id="hud-title" class="hud-title">Galactic Soliton Core</div>
            <div id="hud-text" class="hud-text">Observing flat velocity curves generated by the non-linear eigenvalue of a BEC dark matter fluid.</div>
        </div>
    </div>
</div>

<script>
    // ... [Add your existing script code here] ...
    // ... Remember to add the new button logic inside window.onload ...
</script>
</body>
</html>
